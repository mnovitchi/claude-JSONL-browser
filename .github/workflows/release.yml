name: Release

# DEACTIVATED: the upstream repo has no license, so we must not generate or
# publish binary releases for the moment. The tag trigger below is disabled to
# stop "release by tag" from auto-building installers. The workflow can only be
# started manually (workflow_dispatch), and even that should stay unused until a
# license is in place. To re-enable automatic releases, restore the push/tags
# trigger.
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write # required for tauri-action to create the Release and upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon runner; builds a universal binary
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both targets are needed to assemble the macOS universal binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Sync version to tag
        run: node scripts/sync-version.mjs ${{ github.ref_name }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'JSONL Browser ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true # review assets, then publish manually
          prerelease: false
          args: ${{ matrix.args }}
